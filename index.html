<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RouteLog｜外回り移動記録アプリ</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon-180.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="RouteLog">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 280px; width: 100%; z-index: 1; }
        button { -webkit-tap-highlight-color: transparent; }

        /* 移動手段ボタン */
        .mode-label { cursor: pointer; }
        .mode-label input:checked + div {
            background-color: #2563eb; color: white; border-color: #2563eb;
        }
        .checkin-btn { -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
        .checkin-btn:active { transform: scale(0.95); }

        /* ── 担当者名 モーダル ── */
        #nameModal {
            display: none;
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
        }
        #nameModal.active { display: flex; }
        #nameModalCard {
            animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.85) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ── ボタン内スピナー ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-spinner { animation: spin 0.75s linear infinite; }

        /* ── 距離カウンタ更新アニメ ── */
        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.25); color: #1d4ed8; }
            100% { transform: scale(1); }
        }
        .distance-pop { animation: pop 0.4s ease; }

        /* ── 現在地マーカー pulse ── */
        @keyframes pulse-ring {
            0%   { transform: scale(0.7); opacity: 0.9; }
            80%  { transform: scale(1.6); opacity: 0; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .leaflet-pulsing-icon::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background: rgba(59,130,246,0.5);
            animation: pulse-ring 2s ease-out infinite;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <!-- ── 担当者名 モーダル ── -->
    <div id="nameModal">
        <div id="nameModalCard" class="bg-white rounded-2xl p-6 mx-4 w-full max-w-sm shadow-2xl">
            <div class="text-center mb-5">
                <div class="text-5xl mb-3">👤</div>
                <h2 class="text-xl font-bold text-gray-800">担当者名を入力</h2>
                <p class="text-sm text-gray-400 mt-1">記録・CSV・クラウド集計に使用されます</p>
            </div>
            <input
                type="text"
                id="nameModalInput"
                placeholder="例：田中 太郎"
                autocomplete="name"
                maxlength="20"
                class="w-full p-3.5 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 text-base text-center font-semibold mb-1 transition-colors"
            >
            <p id="nameModalError" class="text-xs text-red-500 text-center h-4 mb-3"></p>
            <button
                id="saveNameBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all"
            >
                保存して始める →
            </button>
        </div>
    </div>

    <!-- ── メインアプリ ── -->
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md relative">

        <!-- ヘッダー -->
        <header class="bg-blue-600 text-white p-3 sticky top-0 z-10 flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-wide">📍 RouteLog</h1>
            <div class="flex items-center gap-2">
                <a href="https://oyajibuki.github.io/tools/routelog/" class="text-xs text-blue-200 hover:text-white">LP</a>
                <button id="exportBtn" class="text-xs bg-blue-500 hover:bg-blue-400 px-3 py-1.5 rounded font-bold shadow">CSV出力</button>
            </div>
        </header>

        <!-- 担当者バー -->
        <div class="bg-blue-700 text-blue-100 text-xs px-4 py-1.5 flex justify-between items-center">
            <span>担当者: <strong id="userNameDisplay" class="text-white text-sm">未設定</strong></span>
            <button id="editUserBtn" class="underline hover:text-white">名前を変更</button>
        </div>

        <!-- マップ -->
        <div id="map" class="border-b border-gray-200"></div>

        <!-- コントロールエリア -->
        <div class="p-4 bg-white">

            <!-- 移動手段 -->
            <div class="flex gap-2 mb-3">
                <label class="mode-label flex-1">
                    <input type="radio" name="mode" value="車" checked class="hidden">
                    <div class="text-center py-2 border border-gray-300 rounded-lg text-sm text-gray-600 transition-colors">🚗 車</div>
                </label>
                <label class="mode-label flex-1">
                    <input type="radio" name="mode" value="電車" class="hidden">
                    <div class="text-center py-2 border border-gray-300 rounded-lg text-sm text-gray-600 transition-colors">🚃 電車</div>
                </label>
                <label class="mode-label flex-1">
                    <input type="radio" name="mode" value="自転車" class="hidden">
                    <div class="text-center py-2 border border-gray-300 rounded-lg text-sm text-gray-600 transition-colors">🚲 自転車</div>
                </label>
                <label class="mode-label flex-1">
                    <input type="radio" name="mode" value="徒歩" class="hidden">
                    <div class="text-center py-2 border border-gray-300 rounded-lg text-sm text-gray-600 transition-colors">🚶 徒歩</div>
                </label>
            </div>

            <!-- メモ入力 -->
            <div class="mb-4">
                <input type="text" id="memoInput" placeholder="訪問先・目的など（任意）"
                    class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 bg-gray-50 text-sm">
            </div>

            <!-- 記録ボタン -->
            <button id="recordBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2.5 transition-all active:scale-95 disabled:bg-gray-400 disabled:cursor-not-allowed">
                <!-- ピンアイコン (通常時) -->
                <svg id="btnPinIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <!-- スピナー (ローディング時) -->
                <svg id="btnSpinner" class="hidden btn-spinner h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.568 3 7.291l3-2z"></path>
                </svg>
                <span id="btnText">現在地を記録する</span>
            </button>
            <p id="statusMsg" class="text-sm text-center text-blue-600 font-bold mt-2 h-5"></p>
        </div>

        <!-- チェックインエリア -->
        <div class="p-4 bg-indigo-50 border-t border-indigo-100">
            <p class="text-xs font-bold text-indigo-700 mb-2 flex items-center gap-1">
                <span>📋</span> 本日のチェックイン
                <span id="cloudBadge" class="ml-auto text-xs text-gray-400">☁️ クラウド未設定</span>
            </p>
            <div class="flex gap-2">
                <button id="checkinMorning"
                    class="checkin-btn flex-1 py-3 bg-orange-400 hover:bg-orange-500 text-white rounded-xl text-sm font-bold shadow">🌅 朝</button>
                <button id="checkinNoon"
                    class="checkin-btn flex-1 py-3 bg-yellow-400 hover:bg-yellow-500 text-white rounded-xl text-sm font-bold shadow">☀️ 昼</button>
                <button id="checkinEvening"
                    class="checkin-btn flex-1 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl text-sm font-bold shadow">🌙 夜</button>
            </div>
            <p id="checkinStatus" class="text-xs text-center text-indigo-600 font-bold mt-2 h-4"></p>
        </div>

        <!-- 本日サマリー -->
        <div class="bg-gradient-to-r from-blue-50 to-indigo-50 mx-4 my-3 p-4 rounded-2xl border border-blue-100 shadow-sm">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs text-blue-400 font-semibold uppercase tracking-wide">Today</p>
                    <p id="distanceName" class="text-xs text-gray-500 mt-0.5">記録を開始してください</p>
                </div>
                <div class="text-right">
                    <div class="flex items-baseline gap-1">
                        <span id="totalDistance" class="text-3xl font-black text-blue-600 inline-block">0.0</span>
                        <span class="text-sm text-blue-400 font-medium">km</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 履歴リスト -->
        <div class="px-4 pb-8">
            <h2 class="font-bold text-gray-700 mb-3 border-b pb-2 flex items-center gap-2">
                <span>📋 今日の記録</span>
                <span id="recordCount" class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-semibold">0件</span>
            </h2>
            <ul id="historyList" class="space-y-2.5"></ul>
        </div>
    </div>

    <script>
    // ============================================================
    //  設定
    // ============================================================
    const STORAGE_KEY = 'mileage_records_v2';
    const USER_KEY    = 'mileage_username';
    // GASエンドポイント（移動ログ・チェックイン送信先）
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyCIOj0829frh8IsGlTQCF_LdqyeD21-myiQA-Hia6IovBfvvBzeogYfWyfNSu4OJGn/exec';

    let map, currentMarker;
    let routeLayers  = [];   // 描画済みルートレイヤー
    let pointMarkers = [];   // スタート/中間/終了マーカー
    let records  = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let userName = localStorage.getItem(USER_KEY) || '';

    // ============================================================
    //  モーダル
    // ============================================================
    function showNameModal(required = false) {
        const modal = document.getElementById('nameModal');
        const input = document.getElementById('nameModalInput');
        // Card アニメーション再生のため一旦外して付け直す
        const card = document.getElementById('nameModalCard');
        card.style.animation = 'none';
        void card.offsetWidth;
        card.style.animation = '';

        input.value = userName;
        document.getElementById('nameModalError').textContent = '';
        modal.dataset.required = required ? 'true' : 'false';
        modal.classList.add('active');
        setTimeout(() => input.focus(), 300);
    }

    function hideNameModal(force = false) {
        const modal = document.getElementById('nameModal');
        const required = modal.dataset.required === 'true';
        if (required && !force) return;
        modal.classList.remove('active');
    }

    document.getElementById('saveNameBtn').addEventListener('click', () => {
        const name = document.getElementById('nameModalInput').value.trim();
        if (!name) {
            document.getElementById('nameModalError').textContent = '名前を入力してください';
            document.getElementById('nameModalInput').classList.add('border-red-400');
            document.getElementById('nameModalInput').focus();
            return;
        }
        document.getElementById('nameModalInput').classList.remove('border-red-400');
        userName = name;
        localStorage.setItem(USER_KEY, userName);
        updateUserNameDisplay();
        hideNameModal(true);
    });

    document.getElementById('nameModalInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('saveNameBtn').click();
    });

    // 背景クリックで閉じる（required = false のみ）
    document.getElementById('nameModal').addEventListener('click', e => {
        if (e.target === document.getElementById('nameModal')) {
            const required = document.getElementById('nameModal').dataset.required === 'true';
            if (!required) hideNameModal(true);
        }
    });

    document.getElementById('editUserBtn').addEventListener('click', () => showNameModal(false));

    // ============================================================
    //  担当者名表示
    // ============================================================
    function updateUserNameDisplay() {
        document.getElementById('userNameDisplay').innerText = userName || '未設定（タップして設定）';
        refreshDistanceLabel();
    }

    function refreshDistanceLabel() {
        const todayCount = getTodayRecords().length;
        const el = document.getElementById('distanceName');
        if (!userName) {
            el.innerText = '記録を開始してください';
        } else if (todayCount === 0) {
            el.innerText = `${userName}さん、今日もお疲れ様です`;
        } else {
            el.innerText = `${userName}さんの移動距離`;
        }
    }

    // ============================================================
    //  地図初期化
    // ============================================================
    function initMap() {
        updateUserNameDisplay();

        map = L.map('map', { zoomControl: true }).setView([35.6895, 139.6917], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        drawMapFromRecords(false);
        renderHistory();

        // 今日の記録があればフィット、なければ現在地へ
        const today = getTodayRecords();
        if (today.length >= 2) {
            map.fitBounds(L.latLngBounds(today.map(r => [r.lat, r.lng])).pad(0.25));
        } else if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                    setCurrentMarker(pos.coords.latitude, pos.coords.longitude);
                },
                () => {}
            );
        }
    }

    function clearMapLayers() {
        routeLayers.forEach(l => { try { map.removeLayer(l); } catch(e) {} });
        routeLayers = [];
        pointMarkers.forEach(m => { try { map.removeLayer(m); } catch(e) {} });
        pointMarkers = [];
    }

    // 現在地パルスマーカー
    function setCurrentMarker(lat, lng) {
        if (currentMarker) { try { map.removeLayer(currentMarker); } catch(e) {} }

        // pulsingIcon: カスタム divIcon で ::before に pulse アニメ適用
        const icon = L.divIcon({
            className: 'leaflet-pulsing-icon',
            html: '<div style="width:14px;height:14px;background:#3b82f6;border:3px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(37,99,235,0.5);"></div>',
            iconSize: [14, 14],
            iconAnchor: [7, 7]
        });
        currentMarker = L.marker([lat, lng], { icon }).addTo(map)
            .bindPopup('<b>現在地</b>');
    }

    // ポイントマーカー（スタート・中間・終了）
    function addPointMarker(lat, lng, type, tooltipText) {
        const colors = { start: '#22c55e', end: '#ef4444', waypoint: '#6366f1' };
        const radii  = { start: 8, end: 8, waypoint: 5 };
        const m = L.circleMarker([lat, lng], {
            radius:      radii[type]  || 5,
            fillColor:   colors[type] || '#6366f1',
            color:       'white',
            weight:      2.5,
            fillOpacity: 1
        }).addTo(map);
        if (tooltipText) m.bindTooltip(tooltipText, { permanent: false, direction: 'top', offset: [0, -8] });
        pointMarkers.push(m);
        return m;
    }

    // ============================================================
    //  ルートアニメーション描画
    //  coords: [[lat,lng], ...]
    //  duration: ms (0 = 即時)
    // ============================================================
    function drawRouteAnimated(coords, duration = 0) {
        return new Promise(resolve => {
            if (!coords || coords.length < 2) { resolve(); return; }

            const line = L.polyline([], {
                color: '#2563eb', weight: 4.5,
                opacity: 0.85, lineJoin: 'round', lineCap: 'round'
            }).addTo(map);
            routeLayers.push(line);

            if (duration <= 0) {
                line.setLatLngs(coords);
                resolve();
                return;
            }

            const startTime = performance.now();
            const total = coords.length;

            function frame(now) {
                const t = Math.min((now - startTime) / duration, 1);
                // easeOutCubic
                const eased = 1 - Math.pow(1 - t, 3);
                const end = Math.max(2, Math.ceil(eased * total));
                line.setLatLngs(coords.slice(0, end));
                if (t < 1) {
                    requestAnimationFrame(frame);
                } else {
                    line.setLatLngs(coords);
                    resolve();
                }
            }
            requestAnimationFrame(frame);
        });
    }

    // 今日の全ルートをマップに描画
    function drawMapFromRecords(animated = false) {
        clearMapLayers();
        const today = getTodayRecords();
        if (today.length === 0) return;

        const animDuration = animated ? 1500 : 0;

        today.forEach((r, i) => {
            // マーカー
            if (i === 0) {
                const t = new Date(r.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                addPointMarker(r.lat, r.lng, 'start', `🟢 スタート ${t}${r.memo ? '  ' + r.memo : ''}`);
            } else if (i < today.length - 1) {
                const t = new Date(r.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                addPointMarker(r.lat, r.lng, 'waypoint', `${t}${r.memo ? '  ' + r.memo : ''}`);
            }

            // ルート
            if (i > 0) {
                const prev = today[i - 1];
                const coords = r.routeCoords && r.routeCoords.length > 1
                    ? r.routeCoords
                    : [[prev.lat, prev.lng], [r.lat, r.lng]];   // fallback: 直線
                drawRouteAnimated(coords, animDuration);
            }
        });

        // 最終マーカー
        if (today.length >= 2) {
            const last = today[today.length - 1];
            const t = new Date(last.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            addPointMarker(last.lat, last.lng, 'end', `🔴 最終 ${t}${last.memo ? '  ' + last.memo : ''}`);
        }
    }

    // ============================================================
    //  距離・ルート計算 (OSRM API)
    //  ※ OSRM は無料のオープンソースルーティングサーバー
    //    overview=full&geometries=geojson でルート形状（座標列）も取得できる
    // ============================================================
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371, toRad = x => x * Math.PI / 180;
        const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // ============================================================
    //  電車ルーティング（Overpass API + Dijkstra法）
    //
    //  仕組み:
    //  1. Overpass API で2点間の矩形範囲内の線路ウェイ＋ノードを取得
    //     （OSM の railway タグが対象: rail / subway / tram / light_rail）
    //  2. ノードと隣接関係からグラフを構築
    //  3. Dijkstra法で出発地最近傍ノード→目的地最近傍ノードの最短経路を探索
    //  4. 経路が見つからない場合は直線距離×1.2 にフォールバック
    //
    //  制限: 直線距離50km超は Overpass のタイムアウトリスクがあるためフォールバック
    // ============================================================
    async function getTrainRoute(lat1, lon1, lat2, lon2) {
        const direct = haversine(lat1, lon1, lat2, lon2);

        if (direct > 50) {
            // 長距離はデータ量が多すぎるためフォールバック
            return { distance: direct * 1.2, coords: [[lat1,lon1],[lat2,lon2]] };
        }

        // バウンディングボックス（距離に応じて余白を調整、最小0.04°≒4km）
        const pad   = Math.max(direct * 0.5, 0.04);
        const south = Math.min(lat1, lat2) - pad;
        const north = Math.max(lat1, lat2) + pad;
        const west  = Math.min(lon1, lon2) - pad;
        const east  = Math.max(lon1, lon2) + pad;

        // Overpass QL クエリ: 主要鉄道種別のウェイとその全ノードを取得
        const query = [
            '[out:json][timeout:20];',
            `way["railway"~"^(rail|subway|tram|light_rail|monorail)$"]`,
            `(${south},${west},${north},${east});`,
            '(._;>;);out body;'
        ].join('');

        try {
            const res  = await fetch('https://overpass-api.de/api/interpreter', {
                method: 'POST',
                body:   query,
                signal: AbortSignal.timeout(15000)
            });
            const data = await res.json();

            // ─ ノードマップ構築 {id: {lat, lng}} ─
            const nodes = {};
            data.elements.forEach(el => {
                if (el.type === 'node') nodes[el.id] = { lat: el.lat, lng: el.lon };
            });

            // ─ 隣接リスト構築 {id: [id, ...]} ─
            const adj = {};
            data.elements.forEach(el => {
                if (el.type !== 'way' || !el.nodes) return;
                for (let i = 0; i < el.nodes.length - 1; i++) {
                    const a = String(el.nodes[i]);
                    const b = String(el.nodes[i + 1]);
                    if (!nodes[a] || !nodes[b]) continue;
                    (adj[a] = adj[a] || []).push(b);
                    (adj[b] = adj[b] || []).push(a);
                }
            });

            const nodeIds = Object.keys(nodes);
            if (nodeIds.length === 0) throw new Error('no railway data');

            // ─ 最近傍ノード検索（ユークリッド近似） ─
            const nearestNode = (lat, lng) => {
                let best = null, bestD = Infinity;
                nodeIds.forEach(id => {
                    const n = nodes[id];
                    const d = (lat - n.lat) ** 2 + (lng - n.lng) ** 2;
                    if (d < bestD) { bestD = d; best = id; }
                });
                return best;
            };

            const startId = nearestNode(lat1, lon1);
            const endId   = nearestNode(lat2, lon2);

            // ─ Dijkstra 最短経路探索 ─
            const distMap = { [startId]: 0 };
            const prev    = {};
            const visited = new Set();
            // [コスト, nodeId] の配列を簡易優先度付きキューとして使用
            const pq = [[0, startId]];

            while (pq.length > 0) {
                pq.sort((a, b) => a[0] - b[0]);
                const [cost, u] = pq.shift();
                if (visited.has(u)) continue;
                visited.add(u);
                if (u === endId) break;

                for (const v of (adj[u] || [])) {
                    if (visited.has(v)) continue;
                    const nu = nodes[u], nv = nodes[v];
                    const newCost = cost + haversine(nu.lat, nu.lng, nv.lat, nv.lng);
                    if (newCost < (distMap[v] ?? Infinity)) {
                        distMap[v] = newCost;
                        prev[v]    = u;
                        pq.push([newCost, v]);
                    }
                }
            }

            if (!prev[endId] && startId !== endId) throw new Error('no path found');

            // ─ 経路を復元 ─
            const path = [];
            let cur = endId;
            while (cur) { path.unshift(cur); cur = prev[cur]; }

            const coords = [
                [lat1, lon1],
                ...path.map(id => [nodes[id].lat, nodes[id].lng]),
                [lat2, lon2]
            ];

            return { distance: distMap[endId] ?? direct * 1.2, coords };

        } catch (err) {
            console.warn('Overpass train routing error:', err);
            // フォールバック: 直線距離 × 1.2
            return { distance: direct * 1.2, coords: [[lat1,lon1],[lat2,lon2]] };
        }
    }

    async function getRoute(lat1, lon1, lat2, lon2, mode) {
        // 電車: Overpass API + Dijkstra で線路に沿ったルートを取得
        if (mode === '電車') {
            return await getTrainRoute(lat1, lon1, lat2, lon2);
        }

        const profileMap = { '車': 'driving', '自転車': 'cycling', '徒歩': 'foot' };
        const profile = profileMap[mode] || 'driving';

        // OSRM Public API
        // overview=full : ルート全体の形状を返す
        // geometries=geojson : GeoJSON形式 [lon, lat] の座標配列
        const url = `https://router.project-osrm.org/route/v1/${profile}/${lon1},${lat1};${lon2},${lat2}?overview=full&geometries=geojson`;

        try {
            const res  = await fetch(url, { signal: AbortSignal.timeout(8000) });
            const data = await res.json();
            if (data.code === 'Ok' && data.routes.length > 0) {
                const route = data.routes[0];
                // GeoJSON は [lon, lat] → Leaflet は [lat, lon] に変換
                const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
                return { distance: route.distance / 1000, coords };
            }
        } catch (err) {
            console.warn('OSRM API error:', err);
        }

        // フォールバック: 直線距離 × 1.3（道のり概算）
        return {
            distance: haversine(lat1, lon1, lat2, lon2) * 1.3,
            coords: [[lat1,lon1],[lat2,lon2]]
        };
    }

    // ============================================================
    //  記録ボタン
    // ============================================================
    const recordBtn = document.getElementById('recordBtn');
    const memoInput = document.getElementById('memoInput');

    function setLoading(text) {
        recordBtn.disabled = true;
        document.getElementById('btnPinIcon').classList.add('hidden');
        document.getElementById('btnSpinner').classList.remove('hidden');
        document.getElementById('btnText').innerText = text;
    }

    function setReady() {
        recordBtn.disabled = false;
        document.getElementById('btnPinIcon').classList.remove('hidden');
        document.getElementById('btnSpinner').classList.add('hidden');
        document.getElementById('btnText').innerText = '現在地を記録する';
    }

    recordBtn.addEventListener('click', async () => {
        if (!userName) { showNameModal(true); return; }
        if (!navigator.geolocation) { alert('GPSに対応していません。'); return; }

        const selectedMode = document.querySelector('input[name="mode"]:checked').value;
        const memoText = memoInput.value.trim();

        setLoading('GPS を取得中...');
        document.getElementById('statusMsg').innerText = '';

        navigator.geolocation.getCurrentPosition(
            async position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const now = new Date();

                let distance   = 0;
                let routeCoords = null;
                const today = getTodayRecords();

                if (today.length > 0) {
                    setLoading(selectedMode === '電車' ? '線路データを取得中...' : 'ルートを計算中...');
                    const prev = today[today.length - 1];
                    const result = await getRoute(prev.lat, prev.lng, lat, lng, selectedMode);
                    distance    = result.distance;
                    routeCoords = result.coords;
                }

                const newRecord = {
                    id: Date.now(),
                    timestamp: now.toISOString(),
                    userName,
                    lat, lng,
                    distance,
                    mode:       distance > 0 ? selectedMode : '-',
                    memo:       memoText,
                    routeCoords // ルート形状をレコードに保存
                };

                records.push(newRecord);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                sendToCloud(newRecord);
                memoInput.value = '';

                // マップを更新：既存ルートを即時描画、新規ルートのみアニメーション
                setLoading('ルートを描画中...');
                clearMapLayers();
                const allToday = getTodayRecords();

                // 既存セグメントを即時描画
                allToday.slice(0, -1).forEach((r, i) => {
                    if (i === 0) {
                        const t = new Date(r.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
                        addPointMarker(r.lat, r.lng, 'start', `🟢 スタート ${t}${r.memo ? '  '+r.memo : ''}`);
                    } else {
                        const t = new Date(r.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
                        addPointMarker(r.lat, r.lng, 'waypoint', `${t}${r.memo ? '  '+r.memo : ''}`);
                    }
                    if (i > 0) {
                        const prev2 = allToday[i - 1];
                        const c = r.routeCoords && r.routeCoords.length > 1
                            ? r.routeCoords
                            : [[prev2.lat, prev2.lng], [r.lat, r.lng]];
                        drawRouteAnimated(c, 0); // 即時
                    }
                });

                // 新規セグメントをアニメーション描画
                map.setView([lat, lng], 15);
                if (routeCoords && routeCoords.length > 1) {
                    await drawRouteAnimated(routeCoords, 1500);
                }

                // 終点マーカー
                const t = now.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
                addPointMarker(lat, lng, allToday.length >= 2 ? 'end' : 'start',
                    allToday.length >= 2 ? `🔴 最終 ${t}${memoText ? '  '+memoText : ''}` : `🟢 スタート ${t}`);

                setCurrentMarker(lat, lng);
                renderHistory();
                setReady();
                document.getElementById('statusMsg').innerText = '✅ 記録完了！';
                setTimeout(() => { document.getElementById('statusMsg').innerText = ''; }, 3000);
            },
            () => {
                alert('位置情報の取得に失敗しました。GPS・権限を確認してください。');
                setReady();
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    });

    // ============================================================
    //  今日のレコード
    // ============================================================
    function getTodayRecords() {
        const todayStr = new Date().toLocaleDateString();
        return records.filter(r => new Date(r.timestamp).toLocaleDateString() === todayStr);
    }

    // ============================================================
    //  履歴レンダリング
    // ============================================================
    function renderHistory() {
        const listEl     = document.getElementById('historyList');
        const distEl     = document.getElementById('totalDistance');
        const countEl    = document.getElementById('recordCount');
        listEl.innerHTML = '';
        const today = getTodayRecords();
        let totalDist = 0;

        [...today].reverse().forEach((r, i) => {
            totalDist += r.distance;
            const isFirst = i === today.length - 1;
            const timeStr = new Date(r.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            const distStr = r.distance > 0 ? `+${r.distance.toFixed(2)} km` : 'スタート地点';
            const modeIcon = { '車':'🚗','電車':'🚃','自転車':'🚲','徒歩':'🚶' }[r.mode] || '📍';
            const distColor = r.distance > 0 ? 'text-blue-600 font-bold' : 'text-gray-400';

            const li = document.createElement('li');
            li.className = 'bg-white border border-gray-100 rounded-xl shadow-sm p-3 flex flex-col gap-1.5 transition-all';
            li.innerHTML = `
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2 flex-wrap">
                        ${isFirst ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">START</span>' : ''}
                        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full font-medium">${modeIcon} ${timeStr}</span>
                    </div>
                    <span class="${distColor} text-sm">${distStr}</span>
                </div>
                ${r.memo ? `<div class="text-sm text-gray-600 pl-2 border-l-2 border-blue-300 bg-blue-50 rounded-r py-0.5 px-2 text-xs">📝 ${r.memo}</div>` : ''}
            `;
            listEl.appendChild(li);
        });

        if (today.length === 0) {
            listEl.innerHTML = '<p class="text-gray-300 text-sm text-center py-8">まだ記録がありません</p>';
        }

        // 距離カウンタ更新 + アニメ
        distEl.innerText = totalDist.toFixed(2);
        distEl.classList.remove('distance-pop');
        void distEl.offsetWidth;
        distEl.classList.add('distance-pop');

        countEl.innerText = `${today.length}件`;
        refreshDistanceLabel();
    }

    // ============================================================
    //  クラウド送信
    // ============================================================
    function sendToCloud(record) {
        if (!GAS_URL) return;
        const params = new URLSearchParams({
            type:      'log',
            timestamp: record.timestamp,
            userName:  record.userName,
            mode:      record.mode,
            distance:  record.distance.toFixed(3),
            lat:       record.lat,
            lng:       record.lng,
            memo:      record.memo || ''
        });
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: params }).catch(() => {});
    }

    function sendCheckin(checkType) {
        if (!userName) { showNameModal(true); return; }
        const statusEl = document.getElementById('checkinStatus');
        statusEl.innerText = `📡 ${checkType}チェックイン送信中...`;

        const doSend = (lat, lng) => {
            if (GAS_URL) {
                const params = new URLSearchParams({
                    type: 'checkin', timestamp: new Date().toISOString(),
                    userName, checkType, lat, lng
                });
                fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: params }).catch(() => {});
            }
            statusEl.innerText = `✅ ${checkType}チェックイン完了！`;
            setTimeout(() => { statusEl.innerText = ''; }, 3000);
        };

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => doSend(pos.coords.latitude, pos.coords.longitude),
                ()  => doSend(0, 0),
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        } else {
            doSend(0, 0);
        }
    }

    // ============================================================
    //  CSV エクスポート
    // ============================================================
    document.getElementById('exportBtn').addEventListener('click', () => {
        if (records.length === 0) { alert('出力するデータがありません。'); return; }
        let csv = "\uFEFF担当者,日時,移動手段,前回からの移動距離(km),メモ,緯度,経度\n";
        records.forEach(r => {
            const d = new Date(r.timestamp).toLocaleString('ja-JP');
            const m = r.memo ? `"${r.memo.replace(/"/g,'""')}"` : '""';
            csv += `${r.userName},${d},${r.mode},${r.distance.toFixed(3)},${m},${r.lat},${r.lng}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `移動記録_${userName}_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'')}.csv`;
        a.click();
    });

    // ============================================================
    //  チェックイン / クラウドバッジ
    // ============================================================
    document.getElementById('checkinMorning').addEventListener('click', () => sendCheckin('朝'));
    document.getElementById('checkinNoon').addEventListener('click',    () => sendCheckin('昼'));
    document.getElementById('checkinEvening').addEventListener('click', () => sendCheckin('夜'));

    function updateCloudBadge() {
        const badge = document.getElementById('cloudBadge');
        if (GAS_URL) {
            badge.textContent = '☁️ クラウド連携中';
            badge.className = 'ml-auto text-xs text-green-600 font-bold';
        }
    }

    // ============================================================
    //  初期化
    // ============================================================
    window.onload = () => {
        updateCloudBadge();
        initMap();
        // 名前未登録なら 600ms 後にモーダル表示
        if (!userName) setTimeout(() => showNameModal(true), 600);
    };

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }

    // アクセスカウンター（ページ表示時に1回送信）
    fetch("https://script.google.com/macros/s/AKfycbznxYkj5ixnK_pHkGR8LUYhEYdvSYpaiF3x4LaZy964wlu068oak1X1uuIiyqCEtGWF/exec?page=route")
        .catch(() => {});
    </script>
</body>
