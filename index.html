<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RouteLog｜外回り移動記録アプリ</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon-180.png">
    <link rel="manifest" href="./manifest.json">
    <!-- iPhone PWA対応 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="RouteLog">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 250px; width: 100%; z-index: 1; }
        button { -webkit-tap-highlight-color: transparent; }
        /* ラジオボタンをボタン風にするスタイル */
        .mode-label { cursor: pointer; }
        .mode-label input:checked + div { background-color: #2563eb; color: white; border-color: #2563eb; }
        /* チェックインボタン */
        .checkin-btn { -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
        .checkin-btn:active { transform: scale(0.95); }
        .checkin-done { opacity: 0.5; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md relative">
        <!-- ヘッダー -->
        <header class="bg-blue-600 text-white p-3 sticky top-0 z-10 flex justify-between items-center">
            <h1 class="text-lg font-bold">📍 RouteLog</h1>
            <div class="flex items-center gap-2">
              <a href="https://oyajibuki.github.io/tools/routelog/" class="text-xs text-blue-200 hover:text-white">LP</a>
              <button id="exportBtn" class="text-xs bg-blue-500 hover:bg-blue-400 px-3 py-1.5 rounded font-bold shadow">CSV出力</button>
            </div>
        </header>

        <!-- 担当者設定エリア -->
        <div class="bg-blue-700 text-blue-100 text-xs px-4 py-1.5 flex justify-between items-center">
            <span>担当者: <strong id="userNameDisplay" class="text-white text-sm">未設定</strong></span>
            <button id="editUserBtn" class="underline hover:text-white">名前を変更</button>
        </div>

        <!-- マップ表示エリア -->
        <div id="map" class="border-b border-gray-300"></div>

        <!-- コントロールエリア（入力と記録） -->
        <div class="p-4 bg-white">
            
            <!-- 移動手段選択 -->
            <div class="flex gap-2 mb-3">
                <label class="mode-label flex-1">
                    <input type="radio" name="mode" value="車" checked class="hidden">
                    <div class="text-center py-2 border border-gray-300 rounded text-sm text-gray-600 transition-colors">🚗 車</div>
                </label>
                <label class="mode-label flex-1">
                    <input type="radio" name="mode" value="電車" class="hidden">
                    <div class="text-center py-2 border border-gray-300 rounded text-sm text-gray-600 transition-colors">🚃 電車</div>
                </label>
                <label class="mode-label flex-1">
                    <input type="radio" name="mode" value="自転車" class="hidden">
                    <div class="text-center py-2 border border-gray-300 rounded text-sm text-gray-600 transition-colors">🚲 自転車</div>
                </label>
                <label class="mode-label flex-1">
                    <input type="radio" name="mode" value="徒歩" class="hidden">
                    <div class="text-center py-2 border border-gray-300 rounded text-sm text-gray-600 transition-colors">🚶 徒歩</div>
                </label>
            </div>

            <!-- メモ入力 -->
            <div class="mb-4">
                <input type="text" id="memoInput" placeholder="訪問先・目的など（任意）" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 bg-gray-50">
            </div>

            <button id="recordBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-transform transform active:scale-95 disabled:bg-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span id="btnText">現在地を記録する</span>
            </button>
            <p id="statusMsg" class="text-sm text-center text-blue-600 font-bold mt-2 h-4"></p>
        </div>

        <!-- チェックインエリア -->
        <div class="p-4 bg-indigo-50 border-t border-indigo-100">
            <p class="text-xs font-bold text-indigo-700 mb-2 flex items-center gap-1">
                <span>📋</span> 本日のチェックイン
                <span id="cloudBadge" class="ml-auto text-xs text-gray-400">☁️ クラウド未設定</span>
            </p>
            <div class="flex gap-2">
                <button id="checkinMorning" class="checkin-btn flex-1 py-3 bg-orange-400 hover:bg-orange-500 text-white rounded-xl text-sm font-bold shadow">
                    🌅 朝
                </button>
                <button id="checkinNoon" class="checkin-btn flex-1 py-3 bg-yellow-400 hover:bg-yellow-500 text-white rounded-xl text-sm font-bold shadow">
                    ☀️ 昼
                </button>
                <button id="checkinEvening" class="checkin-btn flex-1 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl text-sm font-bold shadow">
                    🌙 夜
                </button>
            </div>
            <p id="checkinStatus" class="text-xs text-center text-indigo-600 font-bold mt-2 h-4"></p>
        </div>

        <!-- 本日のサマリー -->
        <div class="bg-blue-50 p-4 mx-4 rounded-lg border border-blue-100 flex justify-between items-center mb-4">
            <span class="font-semibold text-blue-800">本日の移動距離</span>
            <div class="text-2xl font-bold text-blue-600">
                <span id="totalDistance">0.0</span> <span class="text-sm font-normal text-blue-800">km</span>
            </div>
        </div>

        <!-- 履歴リスト -->
        <div class="px-4">
            <h2 class="font-bold text-gray-700 mb-2 border-b pb-1">今日の記録</h2>
            <ul id="historyList" class="space-y-3">
                <!-- JavaScriptで追加 -->
            </ul>
        </div>
    </div>

    <script>
        // --- 設定と初期変数 ---
        const STORAGE_KEY = 'mileage_records_v2'; // データ構造を変えたためキーを変更
        const USER_KEY    = 'mileage_username';
        // GAS URL（デプロイ後にここを書き換える）
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyCIOj0829frh8IsGlTQCF_LdqyeD21-myiQA-Hia6IovBfvvBzeogYfWyfNSu4OJGn/exec';
        let map, marker, polyline;
        let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let userName = localStorage.getItem(USER_KEY) || '';

        // --- クラウド送信（移動ログ） ---
        function sendToCloud(record) {
            if (!GAS_URL) return;
            const params = new URLSearchParams({
                type:      'log',
                timestamp: record.timestamp,
                userName:  record.userName,
                mode:      record.mode,
                distance:  record.distance.toFixed(3),
                lat:       record.lat,
                lng:       record.lng,
                memo:      record.memo || ''
            });
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: params }).catch(() => {});
        }

        // --- チェックイン送信 ---
        function sendCheckin(checkType) {
            if (!userName) {
                alert('まず担当者名を設定してください。');
                return;
            }
            const statusEl = document.getElementById('checkinStatus');
            statusEl.innerText = `📡 ${checkType}チェックイン送信中...`;

            const doSend = (lat, lng) => {
                if (GAS_URL) {
                    const params = new URLSearchParams({
                        type:      'checkin',
                        timestamp: new Date().toISOString(),
                        userName:  userName,
                        checkType: checkType,
                        lat:       lat,
                        lng:       lng
                    });
                    fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: params }).catch(() => {});
                }
                statusEl.innerText = `✅ ${checkType}チェックイン完了！`;
                setTimeout(() => { statusEl.innerText = ''; }, 3000);
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => doSend(pos.coords.latitude, pos.coords.longitude),
                    ()  => doSend(0, 0),
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                );
            } else {
                doSend(0, 0);
            }
        }

        // --- DOM要素 ---
        const mapEl = document.getElementById('map');
        const recordBtn = document.getElementById('recordBtn');
        const btnText = document.getElementById('btnText');
        const statusMsg = document.getElementById('statusMsg');
        const totalDistanceEl = document.getElementById('totalDistance');
        const historyListEl = document.getElementById('historyList');
        const exportBtn = document.getElementById('exportBtn');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const editUserBtn = document.getElementById('editUserBtn');
        const memoInput = document.getElementById('memoInput');

        // --- 初期化処理 ---
        function initMap() {
            updateUserNameDisplay();

            map = L.map('map').setView([35.6895, 139.6917], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            drawMapFromRecords();
            renderHistory();
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        map.setView([lat, lng], 15);
                        updateMarker(lat, lng);
                    },
                    () => { statusMsg.innerText = "現在地を取得できませんでした"; }
                );
            }
        }

        // 担当者名の更新
        function updateUserNameDisplay() {
            if (userName) {
                userNameDisplay.innerText = userName;
            } else {
                userNameDisplay.innerText = "未設定（タップして設定）";
            }
        }

        editUserBtn.addEventListener('click', () => {
            const name = prompt("担当者名（社員名）を入力してください", userName);
            if (name !== null) {
                userName = name.trim();
                localStorage.setItem(USER_KEY, userName);
                updateUserNameDisplay();
            }
        });

        // マーカーの更新
        function updateMarker(lat, lng) {
            if (marker) {
                marker.setLatLng([lat, lng]);
            } else {
                marker = L.marker([lat, lng]).addTo(map);
            }
        }

        // --- 直線距離計算 (フォールバック用) ---
        function calculateStraightDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // --- ルート距離計算 (OSRM API) ---
        async function getRouteDistance(lat1, lon1, lat2, lon2, mode) {
            // 電車はOSRM非対応のため直線距離で概算
            if (mode === '電車') {
                return calculateStraightDistance(lat1, lon1, lat2, lon2) * 1.2;
            }
            let profile = 'driving';
            if (mode === '自転車') profile = 'cycling';
            if (mode === '徒歩') profile = 'foot';

            // OSRM API (lon,latの順なので注意)
            const url = `https://router.project-osrm.org/route/v1/${profile}/${lon1},${lat1};${lon2},${lat2}?overview=false`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.code === 'Ok' && data.routes.length > 0) {
                    // APIはメートルで返すのでキロメートルに変換
                    return data.routes[0].distance / 1000;
                }
            } catch (error) {
                console.error("ルート検索APIエラー", error);
            }
            // APIが失敗した場合は、直線距離に約1.3倍(道のりの概算)をかけて返す
            return calculateStraightDistance(lat1, lon1, lat2, lon2) * 1.3;
        }

        // --- 記録処理 ---
        recordBtn.addEventListener('click', async () => {
            if (!userName) {
                alert('まずは上部の「名前を変更」から担当者名を設定してください。');
                return;
            }
            if (!navigator.geolocation) {
                alert('GPSに対応していません。');
                return;
            }

            const selectedMode = document.querySelector('input[name="mode"]:checked').value;
            const memoText = memoInput.value.trim();

            recordBtn.disabled = true;
            btnText.innerText = 'GPSを探しています...';

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const now = new Date();
                    
                    let distance = 0;
                    const todayRecords = getTodayRecords();

                    if (todayRecords.length > 0) {
                        const lastRecord = todayRecords[todayRecords.length - 1];
                        btnText.innerText = '道のりを計算中...';
                        // APIを使って実際の道のりを取得
                        distance = await getRouteDistance(lastRecord.lat, lastRecord.lng, lat, lng, selectedMode);
                    }

                    const newRecord = {
                        id: Date.now(),
                        timestamp: now.toISOString(),
                        userName: userName,
                        lat: lat,
                        lng: lng,
                        distance: distance,
                        mode: distance > 0 ? selectedMode : '-', // 初回は移動手段なし
                        memo: memoText
                    };

                    records.push(newRecord);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));

                    // クラウドに送信
                    sendToCloud(newRecord);

                    // 入力欄をクリア
                    memoInput.value = '';

                    map.setView([lat, lng], 15);
                    updateMarker(lat, lng);
                    drawMapFromRecords();
                    renderHistory();

                    recordBtn.disabled = false;
                    btnText.innerText = '現在地を記録する';
                    statusMsg.innerText = '記録完了！';
                    setTimeout(() => { statusMsg.innerText = ''; }, 3000);
                },
                (error) => {
                    alert('位置情報の取得に失敗しました。');
                    recordBtn.disabled = false;
                    btnText.innerText = '現在地を記録する';
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });

        // --- 今日の記録を取得 ---
        function getTodayRecords() {
            const todayStr = new Date().toLocaleDateString();
            return records.filter(r => new Date(r.timestamp).toLocaleDateString() === todayStr);
        }

        // --- 画面表示更新 ---
        function renderHistory() {
            historyListEl.innerHTML = '';
            const todayRecords = getTodayRecords();
            let totalDist = 0;

            [...todayRecords].reverse().forEach((r) => {
                totalDist += r.distance;
                const timeStr = new Date(r.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                const distStr = r.distance > 0 ? `+${r.distance.toFixed(2)} km` : 'スタート地点';
                const modeIcon = r.mode === '車' ? '🚗' : r.mode === '電車' ? '🚃' : r.mode === '自転車' ? '🚲' : r.mode === '徒歩' ? '🚶' : '📍';
                
                const li = document.createElement('li');
                li.className = 'bg-white p-3 rounded shadow-sm border border-gray-100 flex flex-col gap-1';
                li.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-sm bg-gray-100 px-1.5 py-0.5 rounded border text-gray-600">${modeIcon} ${timeStr}</span>
                        </div>
                        <span class="font-bold text-gray-800">${distStr}</span>
                    </div>
                    ${r.memo ? `<div class="text-sm text-gray-600 mt-1 pl-1 border-l-2 border-blue-400">📝 ${r.memo}</div>` : ''}
                `;
                historyListEl.appendChild(li);
            });

            if (todayRecords.length === 0) {
                historyListEl.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">まだ記録がありません</p>';
            }
            totalDistanceEl.innerText = totalDist.toFixed(2);
        }

        function drawMapFromRecords() {
            const todayRecords = getTodayRecords();
            const latlngs = todayRecords.map(r => [r.lat, r.lng]);
            if (polyline) map.removeLayer(polyline);
            if (latlngs.length > 1) {
                // 今回はシンプルに点と点を直線で結んで可視化
                polyline = L.polyline(latlngs, {color: '#2563eb', weight: 3, dashArray: '5, 5'}).addTo(map);
            }
        }

        // --- CSVエクスポート ---
        exportBtn.addEventListener('click', () => {
            if (records.length === 0) {
                alert('出力するデータがありません。');
                return;
            }
            // BOM付きUTF-8にしてExcelでの文字化けを防ぐ
            let csvContent = "\uFEFF担当者,日時,移動手段,前回からの移動距離(km),メモ,緯度,経度\n";
            records.forEach(r => {
                const dateStr = new Date(r.timestamp).toLocaleString('ja-JP');
                // メモ内のカンマや改行をエスケープ
                const safeMemo = r.memo ? `"${r.memo.replace(/"/g, '""')}"` : '""';
                csvContent += `${r.userName},${dateStr},${r.mode},${r.distance.toFixed(3)},${safeMemo},${r.lat},${r.lng}\n`;
            });
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `移動記録_${userName}_${new Date().toLocaleDateString('ja-JP').replace(/\//g, '')}.csv`;
            link.click();
        });

        // --- チェックインボタン ---
        document.getElementById('checkinMorning').addEventListener('click', () => sendCheckin('朝'));
        document.getElementById('checkinNoon').addEventListener('click',    () => sendCheckin('昼'));
        document.getElementById('checkinEvening').addEventListener('click', () => sendCheckin('夜'));

        // クラウド接続状態バッジ更新
        function updateCloudBadge() {
            const badge = document.getElementById('cloudBadge');
            if (GAS_URL) {
                badge.textContent = '☁️ クラウド連携中';
                badge.className = 'ml-auto text-xs text-green-600 font-bold';
            } else {
                badge.textContent = '☁️ クラウド未設定';
                badge.className = 'ml-auto text-xs text-gray-400';
            }
        }

        window.onload = () => { initMap(); updateCloudBadge(); };

        // Service Worker登録 (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        // アクセスカウンター（ページ表示時に1回だけ送信）
        fetch("https://script.google.com/macros/s/AKfycbznxYkj5ixnK_pHkGR8LUYhEYdvSYpaiF3x4LaZy964wlu068oak1X1uuIiyqCEtGWF/exec?page=route")
            .catch(() => {});
    </script>
</body>
</html>
